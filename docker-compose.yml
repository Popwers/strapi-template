services:
    strapi-cms:
        container_name: strapi-cms
        build:
            context: .
            args:
                NODE_ENV: production
                PUBLIC_URL: ${PUBLIC_URL}
        image: strapi-cms:latest
        restart: unless-stopped
        env_file: .env
        environment:
            DATABASE_HOST: strapi-cms-db
        volumes:
            - ./public/uploads:/opt/app/public/uploads
        ports:
            - '1337:1337'
        depends_on:
            strapi-cms-db:
                condition: service_healthy

    strapi-cms-db:
        container_name: strapi-cms-db
        restart: unless-stopped
        env_file: .env
        image: postgres:18-alpine
        # Published on loopback only so host-side tooling can reach the DB
        # without exposing it on the LAN.
        ports:
            - '127.0.0.1:${DATABASE_PORT:-5432}:5432'
        environment:
            POSTGRES_USER: ${DATABASE_USERNAME}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            POSTGRES_DB: ${DATABASE_NAME}
        # PG18+ stores data under /var/lib/postgresql/<major>/docker, so the
        # volume is mounted at the parent directory rather than .../data.
        volumes:
            - strapi-cms-pgdata:/var/lib/postgresql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

volumes:
    strapi-cms-pgdata:
