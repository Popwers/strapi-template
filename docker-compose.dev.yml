# Dev override: hot reload via the `dev_runtime` Docker target.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
    strapi-cms:
        build:
            target: dev_runtime
            args:
                NODE_ENV: development
        volumes:
            - ./config:/opt/app/config
            - ./database:/opt/app/database
            - ./src:/opt/app/src
            - ./types:/opt/app/types
            - ./.env:/opt/app/.env
            - ./public/uploads:/opt/app/public/uploads
            # Preserve container node_modules (don't shadow with host)
            - /opt/app/node_modules
